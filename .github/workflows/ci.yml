name: Static game checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run game rules and MCTS tests
        run: node tests/game-rules.test.cjs
      - name: Check shared pages and internal assets
        run: node tests/static-site.test.cjs
